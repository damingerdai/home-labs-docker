apiVersion: v1
kind: Service
metadata:
  name: external-pg
  namespace: kite-system
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: external-pg
  namespace: kite-system
  labels:
    kubernetes.io/service-name: external-pg
addressType: IPv4
ports:
  - protocol: TCP
    port: 5432
endpoints:
  - addresses:
      - "192.168.31.220"
